services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3330:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-123456}
    volumes:
      - ./apps-config.json:/app/apps-config.json
      - ./public/logos:/app/public/logos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
